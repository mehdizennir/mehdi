<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
<title>Manage Membership Plans</title>
</head>

<body>

<h1>Manage Membership Plans</h1>

<table border="1">

<tr>
<th>Plan</th>
<th>Price</th>
<th>Duration</th>
<th>Benefits</th>
<th>Actions</th>
</tr>

<tr>
<td>Bronze</td>
<td>4000 DA / Month</td>
<td>1 Month</td>
<td>Gym Access, Cardio Area, Locker Room</td>
<td>
<button>Edit</button>
<button>Delete</button>
</td>
</tr>

<tr>
<td>Silver</td>
<td>8000 DA / Month</td>
<td>3 Months</td>
<td>Gym + Classes + Sauna + Fitness Assessment</td>
<td>
<button>Edit</button>
<button>Delete</button>
</td>
</tr>

<tr>
<td>Gold</td>
<td>16000 DA / Month</td>
<td>1 Year</td>
<td>All Access + Personal Trainer + VIP Area</td>
<td>
<button>Edit</button>
<button>Delete</button>
</td>
</tr>

</table>

<h2>Add New Plan</h2>

<form>

<label>Plan Name</label><br>
<input type="text"><br>

<label>Price</label><br>
<input type="number"><br>

<label>Duration</label><br>
<input type="text"><br>

<label>Benefits</label><br>
<textarea></textarea><br>

<button type="submit">Add Plan</button>

</form>

</body>
</html>
